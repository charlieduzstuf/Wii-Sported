name: Build PC Port

on:
  push:
    branches: [ copilot/port-code-to-windows-pc ]
  pull_request:
    branches: [ copilot/port-code-to-windows-pc ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Install Dependencies
      run: sudo apt-get update && sudo apt-get install -y cmake build-essential libsdl2-dev libgl1-mesa-dev
    - name: Configure
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release
    - name: Build
      run: cmake --build build --config Release
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WiiSportsPC-Linux
        path: build/bin/WiiSports

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v1
    - name: Install vcpkg
      run: |
        git clone https://github.com/Microsoft/vcpkg.git
        cd vcpkg
        ./bootstrap-vcpkg.bat
        ./vcpkg integrate install
    - name: Install SDL2
      run: ./vcpkg/vcpkg install sdl2:x64-windows
    - name: Configure
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=./vcpkg/scripts/buildsystems/vcpkg.cmake
    - name: Build
      run: cmake --build build --config Release
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WiiSportsPC-Windows
        path: build/bin/Release/WiiSports.exe
