name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Add game versions here
        version: [RSPE01_01]

    steps:
      # Checkout the repository
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      # Set Git config
      - name: Git config
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # Install dependencies
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            python3 \
            python3-pip \
            binutils-powerpc-linux-gnu \
            gcc-powerpc-linux-gnu \
            g++-powerpc-linux-gnu

      # Install Python dependencies
      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pyyaml

      # Restore cached files
      - name: Cache build
        uses: actions/cache@v4
        with:
          path: |
            build
            .ninja_deps
            .ninja_log
          key: ${{ runner.os }}-${{ matrix.version }}-${{ github.sha }}
          restore-keys: ${{ runner.os }}-${{ matrix.version }}-

      # Build the project
      - name: Build
        run: |
          python3 configure.py --map --version ${{ matrix.version }}
          ninja all_source progress build/${{ matrix.version }}/report.json

      # Upload map files
      - name: Upload map
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.version }}_maps
          path: build/${{ matrix.version }}/**/*.MAP
        if: success() || failure()

      # Upload progress report
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.version }}_report
          path: build/${{ matrix.version }}/report.json
        if: success() || failure()
