name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Add game versions here
        version: [RSPE01_01]

    steps:
      # Checkout the repository
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      # Set Git config
      - name: Git config
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # Install dependencies
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            python3 \
            python3-pip \
            binutils-powerpc-linux-gnu \
            gcc-powerpc-linux-gnu \
            g++-powerpc-linux-gnu

      # Install Python dependencies
      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pyyaml

      # Create mock ROM structure for CI validation
      # Note: Real builds require an actual Wii Sports ROM
      - name: Setup mock ROM structure
        run: |
          mkdir -p orig/RSPE01_01/sys
          # Create a minimal mock DOL file (56 bytes header minimum)
          # This allows the build system to validate but won't produce a functional build
          python3 -c "
          import struct
          # DOL header format - simplified mock
          with open('orig/RSPE01_01/sys/main.dol', 'wb') as f:
              # Write minimal DOL header (0x100 bytes)
              # Text section offsets (7 entries)
              for i in range(7):
                  f.write(struct.pack('>I', 0x100))
              # Data section offsets (11 entries)  
              for i in range(11):
                  f.write(struct.pack('>I', 0x100))
              # Text section addresses (7 entries)
              for i in range(7):
                  f.write(struct.pack('>I', 0x80003100))
              # Data section addresses (11 entries)
              for i in range(11):
                  f.write(struct.pack('>I', 0x80003100))
              # Text section sizes (7 entries)
              for i in range(7):
                  f.write(struct.pack('>I', 0))
              # Data section sizes (11 entries)
              for i in range(11):
                  f.write(struct.pack('>I', 0))
              # BSS address
              f.write(struct.pack('>I', 0x80003100))
              # BSS size
              f.write(struct.pack('>I', 0))
              # Entry point
              f.write(struct.pack('>I', 0x80003100))
              # Pad to 0x100
              f.write(b'\\x00' * (0x100 - f.tell()))
          "
          echo "Mock ROM structure created for CI validation"
          echo "Note: Actual Wii Sports ROM required for real builds"

      # Restore cached files
      - name: Cache build
        uses: actions/cache@v4
        with:
          path: |
            build
            .ninja_deps
            .ninja_log
          key: ${{ runner.os }}-${{ matrix.version }}-${{ github.sha }}
          restore-keys: ${{ runner.os }}-${{ matrix.version }}-

      # Build the project
      - name: Build
        run: |
          python3 configure.py --map --version ${{ matrix.version }}
          ninja all_source progress build/${{ matrix.version }}/report.json

      # Upload map files
      - name: Upload map
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.version }}_maps
          path: build/${{ matrix.version }}/**/*.MAP
        if: success() || failure()

      # Upload progress report
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.version }}_report
          path: build/${{ matrix.version }}/report.json
        if: success() || failure()
