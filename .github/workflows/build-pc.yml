name: Build PC Executable

on:
  push:
  pull_request:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Dependencies
      run: sudo apt-get update && sudo apt-get install -y cmake build-essential libsdl2-dev libgl1-mesa-dev pkg-config
    
    - name: Configure CMake
      run: |
        echo "=== Configuring PC Build ==="
        echo "This builds the decompiled code framework"
        echo "Users can use build_from_rom.py to build the complete game with their ROM"
        cmake -B build -DCMAKE_BUILD_TYPE=Release
    
    - name: Build PC Framework
      run: |
        echo "=== Building PC Executable Framework ==="
        echo "Note: This builds only the decompiled portions (~30% of game)"
        echo "For complete build: python build_from_rom.py --rom <your_rom.iso>"
        cmake --build build --config Release
        echo ""
        echo "✅ PC framework built successfully"
        echo "Users: Use build_from_rom.py to build the full game"
    
    - name: Upload Linux Build
      uses: actions/upload-artifact@v4
      with:
        name: WiiSportsPC-Linux
        path: build/bin/WiiSports
      if: success()

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v2
    
    - name: Install vcpkg
      run: |
        git clone https://github.com/Microsoft/vcpkg.git
        cd vcpkg
        ./bootstrap-vcpkg.bat
        cd ..
    
    - name: Install SDL2 via vcpkg
      run: |
        ./vcpkg/vcpkg install sdl2:x64-windows
    
    - name: Configure CMake
      run: |
        Write-Host "=== Configuring PC Build ==="
        Write-Host "This builds the decompiled code framework"
        Write-Host "Users can use build_from_rom.py to build the complete game with their ROM"
        cmake -B build -DCMAKE_BUILD_TYPE=Release "-DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
    
    - name: Build PC Framework
      run: |
        Write-Host "=== Building PC Executable Framework ==="
        Write-Host "Note: This builds only the decompiled portions (~30% of game)"
        Write-Host "For complete build: python build_from_rom.py --rom <your_rom.iso>"
        cmake --build build --config Release
        Write-Host ""
        Write-Host "✅ PC framework built successfully"
        Write-Host "Users: Use build_from_rom.py to build the full game"
    
    - name: Upload Windows Build
      uses: actions/upload-artifact@v4
      with:
        name: WiiSportsPC-Windows
        path: build/bin/Release/WiiSports.exe
      if: success()
