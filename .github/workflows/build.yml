name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Add game versions here
        version: [RSPE01_01]

    steps:
      # Checkout the repository
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      # Set Git config
      - name: Git config
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # Install dependencies
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            python3 \
            python3-pip \
            binutils-powerpc-linux-gnu \
            gcc-powerpc-linux-gnu \
            g++-powerpc-linux-gnu

      # Install Python dependencies
      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pyyaml

      # Validate build environment
      # Note: Full builds require an actual Wii Sports ROM which cannot be provided in CI
      - name: Validate build environment
        run: |
          echo "=== Build Environment Validation ==="
          echo "This workflow validates that the build environment is correctly configured."
          echo "Full builds require an actual Wii Sports ROM (SHA-1: 8bb422971b88b5551a37de98db69557df7b46637)"
          echo ""
          echo "Installed tools:"
          python3 --version
          cmake --version | head -1
          ninja --version
          powerpc-linux-gnu-gcc --version | head -1
          echo ""
          echo "Python packages:"
          python3 -m pip list | grep -E "(pip|pyyaml)"
          echo ""
          echo "Repository structure:"
          ls -la
          echo ""
          echo "Config files:"
          ls -la config/RSPE01_01/
          echo ""
          echo "✅ Build environment is properly configured"
          echo "✅ All required tools are installed"
          echo "✅ Configuration files are present"
          echo ""
          echo "To build locally with your ROM:"
          echo "  1. Place your Wii Sports ROM at: orig/RSPE01_01/sys/main.dol"
          echo "  2. Run: python3 configure.py --map --version RSPE01_01"
          echo "  3. Run: ninja"
